<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Me Valentine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .question-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .local-gif {
            width: 100%;
            max-width: 200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 180px;
        }

        .local-gif img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            pointer-events: none;
        }

        .question {
            font-size: 2.8rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            width: 100%;
        }

        .btn {
            padding: 12px 35px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.1s ease;
        }

        #yes-btn {
            background-color: #ff547d;
        }

        #no-btn {
            background-color: #7b2cbf;
            position: absolute;
            /* İlkin olaraq Yes-in sağında dursun */
            left: calc(50% + 10px); 
            box-shadow: 0 5px 15px rgba(123, 44, 191, 0.4);
            transition: left 0.15s ease, top 0.15s ease;
        }
    </style>
</head>
<body>

    <div class="question-container">
        <div class="local-gif">
            <img id="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0NjZnd3h6ZDRnMm1vZXg0Y3g0eW9tNmN5bW90bXNtcDRscW9wdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cM9Yv0VwX9wtsBAtK5/giphy.gif" alt="Cute Bear">
        </div>
        <h1 class="question" id="question-text">Do you love me?</h1>
        <div class="button-container">
            <button class="btn" id="yes-btn" onclick="selectYes()">Yes</button>
            <button class="btn" id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const gif = document.getElementById('gif');
        const questionText = document.getElementById('question-text');

        function moveNoButton() {
            // "No" düyməsinin pəncərənin hər yerinə qaçması
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            // Yes kliklənəndə videodakı kimi qucaqlaşan ayıların gəlməsi
            questionText.textContent = "I knew it! 😍";
            gif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW90bm9pZGRpOHh3Ym95b3g0d3V0eW9tbXNtcDRscW9wdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v9xM6uNWGv0Uo/giphy.gif";
            
            // Düymələri ekrandan tamamilə yox edirik
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';
        }
    </script>
</body>
</html>
