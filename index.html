<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Heart Particles Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #00000033;
            z-index: 1;
        }
        /* "I Love You" yazısı üçün xüsusi və yavaşca çıxan animasiya */
        .love-text {
            position: absolute;
            font-family: 'Poppins', 'Georgia', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff003c;
            z-index: 2;
            pointer-events: none;
            /* Ekranın tam ortasından bir az aşağıda dayanması üçün */
            margin-top: 320px; 
            text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c, 0 0 30px #ff003c;
            opacity: 0;
            animation: fadeInAndGlow 4s ease-in-out forwards;
        }

        @keyframes fadeInAndGlow {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <div class="love-text">I Love You</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Ürəyin riyazi formulası
        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        const particles = [];
        const particleCount = 600;

        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const pos = heartPosition(t);
            const r = Math.random() * 2 + 1;
            const speed = Math.random() * 0.5 + 0.2;
            particles.push({
                t: t,
                baseX: pos.x,
                baseY: pos.y,
                x: pos.x,
                y: pos.y,
                r: r,
                speed: speed,
                scale: Math.random() * 10 + 10
            });
        }

        let loopCount = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            loopCount += 0.05;
            const pulse = 1 + Math.sin(loopCount) * 0.1;

            ctx.fillStyle = '#ff003c';
            ctx.translate(width / 2, height / 2);

            particles.forEach(p => {
                p.t += 0.005;
                const pos = heartPosition(p.t);
                
                // Hissəciklərin hərəkəti və döyünmə effekti
                p.x = pos.x * p.scale * pulse;
                p.y = pos.y * p.scale * pulse;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
