<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Heart Particles Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Telefonda səhifəni aşağı çəkəndə yenilənməsin dərək */
            overscroll-behavior: none; 
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #00000033;
            z-index: 1;
        }
        /* Telefona uyğunlaşdırılmış "I Love You" yazısı */
        .love-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            font-size: 2.2rem; /* Telefonda ideal görünən ölçü */
            font-weight: bold;
            color: #ff003c;
            z-index: 2;
            pointer-events: none;
            text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c, 0 0 30px #ff003c;
            opacity: 0;
            animation: fadeInAndGlow 3.5s ease-in-out forwards;
            white-space: nowrap;
        }

        /* Kiçik ekranlı telefonlar üçün yazı ölçüsünü bir az da optimallaşdırırıq */
        @media (max-width: 480px) {
            .love-text {
                font-size: 1.8rem;
            }
        }

        @keyframes fadeInAndGlow {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <div class="love-text">I Love You</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Telefon çevriləndə və ya ölçü dəyişəndə avtomatik uyğunlaşma
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        const particles = [];
        const particleCount = 500; // Telefonlarda donma olmasın deyə optimal say

        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const pos = heartPosition(t);
            const r = Math.random() * 2 + 1;
            const speed = Math.random() * 0.5 + 0.2;
            
            // Telefon ekranına görə ürəyin ölçüsünü (scale) tənzimləyirik
            const baseScale = Math.min(width, height) / 30; 

            particles.push({
                t: t,
                baseX: pos.x,
                baseY: pos.y,
                x: pos.x,
                y: pos.y,
                r: r,
                speed: speed,
                scale: baseScale + (Math.random() * 2 - 1)
            });
        }

        let loopCount = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            loopCount += 0.05;
            const pulse = 1 + Math.sin(loopCount) * 0.08;

            ctx.fillStyle = '#ff003c';
            ctx.translate(width / 2, height / 2);

            // Ekran dəyişdikdə ürəyin ölçüsünü yenidən hesablayırıf
            const currentScale = Math.min(width, height) / 28;

            particles.forEach(p => {
                p.t += 0.005;
                const pos = heartPosition(p.t);
                
                p.x = pos.x * currentScale * pulse;
                p.y = pos.y * currentScale * pulse;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
