<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Love Me Valentine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Poppins', sans-serif;
        }
        .question-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: 0.2s;
            text-align: center;
        }
        .local-gif img {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            display: block;
            margin: 0 auto 30px;
            pointer-events: none;
        }
        .question {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #333;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            position: relative;
        }
        .btn {
            position: absolute;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-family: "Poppins", sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            transform: scale(1.05);
            box-shadow: 0px 5px 15px rgba(35, 129, 179, 0.5);
        }
        #yes-btn {
            background-color: #ff547d;
            left: -80px;
        }
        #no-btn {
            background-color: #7b2cbf;
            left: 40px;
            transition: left 0.1s ease, top 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="question-container">
        <div class="local-gif">
            <img id="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0NjZnd3h6ZDRnMm1vZXg0Y3g0eW9tNmN5bW90bXNtcDRscW9wdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cM9Yv0VwX9wtsBAtK5/giphy.gif">
        </div>
        <h1 class="question">Do you love me?</h1>
        <div class="button-container">
            <button class="btn" id="yes-btn">Yes</button>
            <button class="btn" id="no-btn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const gif = document.getElementById('gif');
        const question = document.getElementById('question');

        noBtn.addEventListener('mouseover', () => {
            const x = Math.floor(Math.random() * 300) - 150;
            const y = Math.floor(Math.random() * 300) - 150;
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        yesBtn.addEventListener('click', () => {
            document.querySelector('.question').textContent = "I knew it! 🥰";
            gif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW90bm9pZGRpOHh3Ym95b3g0d3V0eW9tbXNtcDRscW9wdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v9xM6uNWGv0Uo/giphy.gif";
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';
        });
    </script>
</body>
</html>
