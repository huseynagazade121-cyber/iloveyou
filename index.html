<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Heart Animation Switch</title>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 50px;
        }

        /* Toggle Button Styles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: #ff547d;
        }
        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        /* Neon Ürək Animasiya Sahəsi */
        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: none;
        }
        input:checked ~ .heart-container {
            display: block;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        path {
            stroke: #ff547d;
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawHeart 3s linear forwards;
            filter: drop-shadow(0 0 8px #ff547d);
        }

        @keyframes drawHeart {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>

    <label class="toggle-switch">
        <input type="checkbox" id="trigger">
        <span class="toggle-slider"></span>
    </label>

    <div class="heart-container">
        <svg viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
    </div>

</body>
</html>
